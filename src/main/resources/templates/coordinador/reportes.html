<!DOCTYPE html>
<html th:replace="~{layout/coordinador-layout :: layout('Centro de Reportes', ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<body>
    <section>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body p-5 text-center">
                        <div class="mb-4">
                            <i class="bi bi-file-earmark-excel text-success" style="font-size: 5rem;"></i>
                        </div>
                        <h4 class="card-title fw-bold">Reporte de Beneficios Asignados</h4>
                        <p class="card-text text-muted mb-4 fs-5">
                            Descarga un archivo Excel con el listado completo de todos los estudiantes que han obtenido becas o descuentos por su excelente desempeño en las pruebas de estado.
                        </p>
                        <a th:href="@{/coordinador/reportes/exportar/beneficios}" class="btn btn-success btn-lg px-5">
                            <i class="bi bi-download me-2"></i> Descargar Excel
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
