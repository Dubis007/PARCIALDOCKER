<!DOCTYPE html>
<html th:replace="~{layout/admin-layout :: layout('Gestión de Facultades', ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<body>
    <section>
        <!-- Alertas -->
        <div th:if="${param.exito}" class="alert alert-success alert-dismissible fade show" role="alert">
            Facultad guardada correctamente.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${param.eliminado}" class="alert alert-danger alert-dismissible fade show" role="alert">
            Facultad eliminada del sistema.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h6 class="m-0 fw-bold text-primary">Listado de Facultades</h6>
                <!-- Botón para abrir Modal -->
                <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalFacultad">
                    <i class="bi bi-plus-circle me-1"></i> Nueva Facultad
                </button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Nombre de la Facultad</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="facultad : ${facultades}">
                                <td th:text="${facultad.id}">1</td>
                                <td th:text="${facultad.nombre}">Ingeniería</td>
                                <td class="text-end">
                                    <form th:action="@{/admin/facultades/eliminar/{id}(id=${facultad.id})}" method="post" class="d-inline" onsubmit="return confirm('¿Estás seguro de eliminar esta facultad?');">
                                        <button type="submit" class="btn btn-danger btn-sm"><i class="bi bi-trash"></i></button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(facultades)}">
                                <td colspan="3" class="text-center text-muted py-4">No hay facultades registradas.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Modal Nueva Facultad -->
        <div class="modal fade" id="modalFacultad" tabindex="-1" aria-labelledby="modalFacultadLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalFacultadLabel">Registrar Facultad</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/admin/facultades/guardar}" th:object="${nuevaFacultad}" method="post">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre de la Facultad</label>
                                <input type="text" class="form-control" id="nombre" th:field="*{nombre}" required>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
