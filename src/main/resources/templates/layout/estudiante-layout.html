<!DOCTYPE html>
<html th:fragment="layout(title, content)" xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Estudiante UTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');
        :root { --uts-blue: #003E65; --uts-green: #A5C424; --uts-light: #f4f7f6; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--uts-light); }
        .sidebar { min-height: 100vh; width: 260px; background-color: var(--uts-blue); box-shadow: 4px 0 15px rgba(0,0,0,0.1); z-index: 10; }
        .sidebar a { color: rgba(255,255,255,0.8); border-radius: 8px; margin: 5px 15px; padding: 12px 20px; transition: all 0.3s; font-weight: 500; }
        .sidebar a:hover, .sidebar a.active { background-color: var(--uts-green); color: white; transform: translateX(5px); box-shadow: 0 4px 10px rgba(165,196,36,0.3); }
        .main-content { flex: 1; }
        .navbar { background-color: white !important; box-shadow: 0 2px 15px rgba(0,0,0,0.03); }
        .card { border-radius: 15px; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.04); transition: all 0.3s ease; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.08); }
        .card-header { background-color: white; border-bottom: 2px solid var(--uts-light); border-radius: 15px 15px 0 0 !important; padding: 1.25rem; }
        .btn-primary { background-color: var(--uts-blue); border: none; border-radius: 8px; }
        .btn-primary:hover { background-color: #002845; }
    </style>
</head>
<body class="d-flex">
    <div class="sidebar d-flex flex-column flex-shrink-0 pt-4">
        <a href="/" class="d-flex align-items-center mb-4 text-white text-decoration-none px-4">
            <i class="bi bi-mortarboard-fill fs-3 me-3" style="color: var(--uts-green);"></i>
            <span class="fs-5 fw-bold">Mi Portal UTS</span>
        </a>
        <ul class="nav nav-pills flex-column mb-auto">
            <li><a th:href="@{/estudiante/dashboard}" class="nav-link nav-menu-link"><i class="bi bi-person-vcard me-3"></i> Mi Perfil</a></li>
            <li><a th:href="@{/estudiante/resultados}" class="nav-link nav-menu-link"><i class="bi bi-bar-chart me-3"></i> Mis Resultados</a></li>
            <li><a th:href="@{/estudiante/beneficios}" class="nav-link nav-menu-link"><i class="bi bi-award me-3"></i> Mis Beneficios</a></li>
            <li><a th:href="@{/estudiante/pagos}" class="nav-link nav-menu-link"><i class="bi bi-receipt me-3"></i> Derechos de Grado</a></li>
        </ul>
        <div class="p-4">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light w-100 rounded-3"><i class="bi bi-box-arrow-left me-2"></i>Cerrar Sesión</button>
            </form>
        </div>
    </div>
    <div class="main-content d-flex flex-column">
        <nav class="navbar navbar-expand-lg px-4 py-3">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h4 fw-bold" style="color: var(--uts-blue);" th:text="${title}">Título</span>
                <div class="d-flex align-items-center">
                    <span class="fw-bold text-secondary bg-light px-3 py-2 rounded-pill">
                        <i class="bi bi-person-circle me-2" style="color: var(--uts-blue);"></i> <span th:text="${#authentication.name}">Estudiante</span>
                    </span>
                </div>
            </div>
        </nav>
        <div class="container-fluid p-4"><div th:replace="${content}"></div></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>document.addEventListener("DOMContentLoaded",()=>document.querySelectorAll('.nav-menu-link').forEach(l=>{if(l.getAttribute('href')===window.location.pathname)l.classList.add('active');}));</script>
</body>
</html>
