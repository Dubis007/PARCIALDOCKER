<!DOCTYPE html>
<html th:replace="~{layout/docente-layout :: layout('Consulta de Estudiantes', ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<body>
    <section>
        <!-- Buscador -->
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <form th:action="@{/docente/consultas}" method="get" class="row g-3 align-items-center">
                    <div class="col-auto">
                        <label for="documento" class="col-form-label fw-bold">Buscar por Documento:</label>
                    </div>
                    <div class="col-auto">
                        <input type="text" id="documento" name="documento" class="form-control" th:value="${documentoBuscado}" placeholder="Ej: 10203040">
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn text-white" style="background-color: #6f42c1;">
                            <i class="bi bi-search me-1"></i> Buscar
                        </button>
                        <a th:href="@{/docente/consultas}" class="btn btn-outline-secondary ms-2" th:if="${busquedaActiva}">Limpiar</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Resultados -->
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <h6 class="m-0 fw-bold" style="color: #6f42c1;">Resultados de la Consulta</h6>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Documento</th>
                                <th>Código</th>
                                <th>Nombres y Apellidos</th>
                                <th>Semestre</th>
                                <th>Estado Pruebas</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="est : ${estudiantes}">
                                <td th:text="${est.documento}">123</td>
                                <td th:text="${est.codigo}">001</td>
                                <td th:text="${est.nombres + ' ' + est.apellidos}">Juan Pérez</td>
                                <td th:text="${est.semestre}">10</td>
                                <td><span class="badge bg-secondary">Sin Resultados</span></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(estudiantes)}">
                                <td colspan="5" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                                    No se encontraron estudiantes con los criterios de búsqueda.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
