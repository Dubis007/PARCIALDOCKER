spring.application.name=pruebas-tyt
# ===============================
# CONFIGURACIÓN DEL SERVIDOR
# ===============================
server.port=8083
server.servlet.context-path=/
# ===============================
# ==================== DATASOURCE ====================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/pruebas_tyt?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota&connectTimeout=30000&socketTimeout=60000
spring.datasource.username=root
spring.datasource.password=

# Driver (opcional, Spring Boot suele detectarlo)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración Hikari (pool de conexiones)
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=10

# ==================== JPA / HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Evitar warnings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false 

# ===============================
# CONFIGURACIÓN THYMELEAF
# ===============================
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ===============================
# UPLOAD DE ARCHIVOS (Preparación Etapa 10 - Excel)
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.pruebastyt=DEBUG
logging.level.org.hibernate.SQL=DEBUG

